      /* Self-hosted font - no network dependency, zero flash */
      @font-face {
        font-family: "Pixelify Sans";
        font-style: normal;
        font-weight: 400 700;
        font-display: block;
        src: url("/fonts/PixelifySans.woff2") format("woff2");
        unicode-range:
          U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC,
          U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193,
          U+2212, U+2215, U+FEFF, U+FFFD;
      }

      /* Critical styles - prevents any flash of wrong font, bg, or cursor */
      html,
      body {
        background: #1a1a2e;
        margin: 0;
        font-family: "Pixelify Sans", "Courier New", monospace;
        color: #e0e0e0;
        cursor:
          url("/cursor/pointer_a.png") 4 2,
          default;
      }
